function renderHome(){

  let h=`<div class="hero"><h1>${urlIndustry?urlIndustry+" ж¶“ж’іоҶҚ":"йҺөжғ§еҹҢйҸҲвӮ¬й–«еӮҡжӮҺйҺ®г„§ж®‘ж¶“ж’іоҶҚ"}</h1>${urlIndustry?"<p>еЁҙеҝҡоқҚ"+urlIndustry+"жЈ°е——з…ҷйҗЁеӢӘз¬“ж¶“ж°«з¬“зҖ№?/p>":"<p>24йӘһеӯҳз№Ғй‘°?и·Ҝ 10000+йҺҙж„¬е§ӣеҰ—е ңз·Ҙ и·Ҝ 98%зҖ№гҲЎеҹӣе©Ҡв„ғеү°жҗҙ?/p>"}<div class="search-box"><input type="text" id="searchInput" placeholder="йҺјж»…еӮЁж¶“ж’іоҶҚжҝ®ж’іжӮ•/йҺҝе‘ҙжҡұжЈ°е——з…ҷ..." onkeydown="if(event.key==='Enter')searchExperts()"><select id="industryFilter">${io}</select><button class="btn btn-primary" onclick="searchExperts()">йҺјж»…еӮЁ</button></div><div class="hot-searches" id="hotSearches"></div><a class="search-toggle" onclick="toggleAdvSearch()">жҘӮжЁјйӘҮз»ӣж¶ўвӮ¬?йҲ»?/a><div class="search-panel" id="advSearchPanel"><div class="filter-row"><div class="filter-group"><label>йҸҲвӮ¬жөЈеәқзҺҜйҸҚ?/label><input type="number" id="filterMinPrice" placeholder="ж¶“е¶үжӘә" min="0"></div><div class="filter-group"><label>йҸҲвӮ¬жҘӮжЁ№зҺҜйҸҚ?/label><input type="number" id="filterMaxPrice" placeholder="ж¶“е¶үжӘә" min="0"></div><div class="filter-group"><label>йҸҲвӮ¬жөЈеәӨзҳҺйҚ’?/label><select id="filterMinRating"><option value="">ж¶“е¶үжӘә</option><option value="4">4.0жө гғӨз¬Ӯ</option><option value="4.5">4.5жө гғӨз¬Ӯ</option><option value="4.8">4.8жө гғӨз¬Ӯ</option></select></div><div class="filter-group"><button class="btn btn-primary btn-sm" onclick="applyAdvSearch()">жҗҙж—Ӯж•Өз»ӣж¶ўвӮ¬?/button></div></div></div></div>${backBtn}<div class="hero-cta-row"><a class="btn btn-cta-hero" onclick="document.getElementById('expertList').scrollIntoView({behavior:'smooth'})">йҰғж”і еЁҙеҝҡоқҚйҺәг„Ёеҙҳж¶“ж’іоҶҚ</a><a class="btn btn-cta-hero btn-cta-outline" onclick="event.preventDefault();showRegister()">йҰғжҮҶйҰғжҚҲ йҺҙж„ӘиҙҹйӘһеҶІеҪҙж¶“ж’іоҶҚ</a></div><div class="stats-bar"><div class="stat-item"><div class="stat-num">128</div><div class="stat-label">йҚҸгғ©в”—ж¶“ж’іоҶҚ</div></div><div class="stat-item"><div class="stat-num">3650+</div><div class="stat-label">зҖ№еұҫ async function loadExperts(page,forceIndustry){page=page||1;const kw=document.getElementById("searchInput")?document.getElementById("searchInput").value:"";let ind=forceIndustry||(document.getElementById("industryFilter")?document.getElementById("industryFilter").value:"");let url="/experts?page="+page+"&limit=12";if(kw)url+="&keyword="+encodeURIComponent(kw);if(ind)url+="&industry="+encodeURIComponent(ind);showSkeleton();const data=await fetch(API+url).then(r=>r.json());const el=document.getElementById("expertList");const titleEl=document.getElementById("expertSectionTitle");if(ind){titleEl.textContent=ind+" ж¶“ж’іоҶҚ";if(document.getElementById("industryFilter"))document.getElementById("industryFilter").value=ind;}else if(kw)titleEl.textContent="йҺјж»…еӮЁзјҒж’ҙзҒү";else titleEl.textContent="йҺәг„Ёеҙҳж¶“ж’іоҶҚ";if(!data.list||!data.list.length){el.innerHTML="<div class=\"empty\"><div class=\"icon\">ж¶“ж’іоҶҚ</div>йҸҶеӮӣжЈӨж¶“ж’іоҶҚ</div>";return;}let h="";for(const e of data.list){const pu=e.photo_path?"<img class=\"avatar\" src=\""+e.photo_path+"\" onerror=\"this.style.display='none'\">":"<div class=\"avatar\">?</div>";h+="<div class=\"expert-card\" onclick=\"renderExpertDetail("+e.id+")\">"+pu+"<div class=\"name\">"+escHtml(e.real_name||"ж¶“ж’іоҶҚ")+"</div><div class=\"title\">"+escHtml(e.title||"")+"</div><div><span class=\"tag\">"+escHtml(e.industry||"")+"</span></div>"+(e.avg_rating?"<div class=\"rating\">"+"йҲҪ?.repeat(Math.round(e.avg_rating))+" "+e.avg_rating.toFixed(1)+" ("+e.review_count+"йҸү?</div>":"")+(e.consult_fee>0?"<div class=\"fee\">жҘј"+e.consult_fee+"/еЁҶ?/div>":"")+(e.verified?"<div class=\"verified-badge\">е®ёиҢ¶о…»з’Ү?/div>":"")+"</div>";}el.innerHTML=h;}

async function renderExpertDetail(id){var _a=document.getElementById("app");if(_a)_a.innerHTML="<div style=\"padding:40px;text-align:center\"><div class=\"skeleton skeleton-circle\" style=\"width:120px;height:120px;margin:0 auto 20px\"></div><div class=\"skeleton skeleton-line\" style=\"width:200px;margin:0 auto 12px\"></div><div class=\"skeleton skeleton-line short\" style=\"width:150px;margin:0 auto\"></div></div>";const e=await fetch(API+"/experts/"+id).then(r=>r.json());currentExpertDetail=e;let h="<div class=\"card\" style=\"display:flex;gap:24px;flex-wrap:wrap\"><div style=\"flex:0 0 120px;text-align:center\">"+(e.photo_path?"<img src=\""+e.photo_path+"\" style=\"width:120px;height:120px;border-radius:50%;object-fit:cover\">":"<div style=\"width:120px;height:120px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto\">?</div>")+"</div><div style=\"flex:1;min-width:240px\"><div style=\"font-size:22px;font-weight:700\">"+escHtml(e.real_name||"ж¶“ж’іоҶҚ")+"</div><div style=\"color:#667eea;margin:6px 0\">"+escHtml(e.title||"")+"</div><div><span class=\"tag\">"+escHtml(e.industry||"")+"</span>"+(e.verified?" <span class=\"tag\" style=\"background:#f0fff4;color:#22543d\">е®ёиҢ¶о…»з’Ү?/span>":"")+"</div>"+(e.avg_rating?"<div style=\"margin-top:8px;color:#f6ad55;font-size:16px\">"+"йҲҪ?.repeat(Math.round(e.avg_rating))+" "+e.avg_rating.toFixed(1)+" ("+e.review_count+"йҸү?</div>":"")+(e.consult_fee>0?"<div style=\"margin-top:8px;font-size:15px;font-weight:600;color:#667eea\">йҚңг„ЁоҮ—з’җзҷёзҙ°жҘј"+e.consult_fee+"/еЁҶ?/div>":"")+"</div></div>";if(e.audit_status==='approved'){if(e.self_intro)h+="<div class=\"card\"><div style=\"font-weight:600;margin-bottom:10px\">ж¶“оҒғжұүз» вӮ¬жө ?/div><div style=\"font-size:14px;line-height:1.8\">"+escHtml(e.self_intro).replace(/\n/g,"<br>")+"</div></div>";if(e.achievements)h+="<div class=\"card\"><div style=\"font-weight:600;margin-bottom:10px\">ж¶“жҳҸоӣҰж¶“ж°ұе“—</div><div style=\"font-size:14px;line-height:1.8\">"+escHtml(e.achievements).replace(/\n/g,"<br>")+"</div></div>";const reviews=await fetch(API+"/experts/"+id+"/reviews").then(r=>r.json());h+="<div class=\"card\"><div class=\"section-title\">йҗўг„Ұеҹӣз’ҮеӢӘзҺҜ ("+(reviews||[]).length+")</div>";if(currentUser&&currentUser.id!==e.user_id)h+="<div style=\"margin-bottom:16px\"><button class=\"btn btn-sm btn-outline\" onclick=\"showReviewForm("+id+")\">йҚҗж¬’зҳҺжө ?/button></div>";if(!reviews||!reviews.length)h+="<div style=\"color:#a0aec0;font-size:14px\">йҸҶеӮӣжЈӨз’ҮеӢӘзҺҜ</div>";else{for(const rv of reviews){h+="<div class=\"review-card\"><div style=\"font-weight:600\">"+escHtml(rv.real_name||rv.username)+"</div><div class=\"star-display\">"+"йҲҪ?.repeat(rv.rating)+"йҲҪ?.repeat(5-rv.rating)+" <span style=\"color:#718096;font-size:13px\">"+rv.rating+"йҸ„?/span></div>"+(rv.content?"<div class=\"content\">"+escHtml(rv.content).replace(/\n/g,"<br>")+"</div>":"")+(rv.reply?"<div class=\"reply\"><strong>ж¶“ж’іоҶҚйҚҘзӮІоҳІй”ӣ?/strong>"+escHtml(rv.reply).replace(/\n/g,"<br>")+"</div>":"")+"<div style=\"font-size:12px;color:#a0aec0;margin-top:6px\">"+(rv.created_at||"")+"</div></div>";}}h+="</div>";const articles=await fetch(API+"/experts/"+id+"/articles").then(r=>r.json());if(articles&&articles.length){h+="<div class=\"card\"><div class=\"section-title\">ж¶“ж’іоҶҚйҸӮеӣ©зҸ·</div>";for(const a of articles){h+="<div class=\"article-preview\" onclick=\"renderArticle("+a.id+")\"><div style=\"font-weight:600;font-size:15px\">"+escHtml(a.title)+"</div><div style=\"font-size:12px;color:#a0aec0;margin-top:4px\">"+(a.views||0)+"еЁҶпҝ ж§„з’Ү?и·Ҝ "+(a.created_at||"")+"</div></div>";}h+="</div>";}}if(currentUser&&currentUser.id!==e.user_id){h+="<div class=\"card\" style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-primary\" onclick=\"showBooking("+id+")\">жЈ°еӢӯе®ійҚңг„ЁоҮ—</button><button class=\"btn btn-outline\" onclick=\"toggleFavorite("+id+","+(e.is_favorite?1:0)+") function setStar(n){currentStars=n;const s=document.querySelectorAll("#starPicker span");s.forEach((x,i)=>x.textContent=i<n?"йҲҪ?:"йҲҪ?);}
async function submitReview(expertId){if(!currentStars)return alert("з’ҮзғҪвӮ¬еӨӢе«Ёз’ҮеӢ«еһҺ");await fetch(API+"/experts/"+expertId+"/review",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rating:currentStars,content:document.getElementById("reviewContent").value})});closeModal();renderExpertDetail(expertId);}

function showBooking(expertId){window._bExp=expertId;window._bY=new Date().getFullYear();window._bM=new Date().getMonth();openModal("<h3>жЈ°еӢӯе®ійҚңг„ЁоҮ—</h3><div class=\"calendar-view\"><div class=\"cal-header\"><button onclick=\"calNav(-1)\">йҲјвӮ¬</button><h4 id=\"calTitle\"></h4><button onclick=\"calNav(1)\">йҲ»?/button></div><div class=\"cal-grid\" id=\"calGrid\"></div><div class=\"time-slots\" id=\"timeSlots\" style=\"display:none\"></div></div><div class=\"form-group\" style=\"margin-top:16px\"><label>йҚңг„ЁоҮ—йҸғе •жҡұй”ӣе қеһҺй–ҪзҮӮзҙҡ</label><input type=\"number\" id=\"bookingDuration\" value=\"60\" min=\"30\" max=\"180\"></div><div class=\"form-group\"><label>йҚңг„ЁоҮ—ж¶“е©ҡо•Ҫ</label><textarea id=\"bookingTopic\" placeholder=\"з» вӮ¬з‘•дҪ№ејҝжқ©?..\"></textarea></div><button class=\"btn btn-primary\" id=\"submitBookingBtn\" onclick=\"submitBooking("+expertId+")\" disabled>з’ҮзғҪвӮ¬еӨӢе«ЁйҸғгғҰж№ЎйҚңеұҫжӨӮй—Ӯ?/button>");renderCal();}

function renderCal(){const y=window._bY,m=window._bM;const t=document.getElementById("calTitle");if(t)t.textContent=y+"йӘһ?+(m+1)+"йҸҲ?;const g=document.getElementById("calGrid");if(!g)return;const fd=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const today=new Date();let h="";const dn=["йҸғ?,"ж¶“вӮ¬","жөң?,"ж¶“?,"йҚҘ?,"жөң?,"йҚҸ?];for(const d of dn)h+='<div class="day-hdr">'+d+'</div>';for(let i=0;i<fd;i++)h+='<div class="day-c dis"></div>';for(let d=1;d<=dim;d++){const dt=new Date(y,m,d);const past=dt<new Date(today.getFullYear(),today.getMonth(),today.getDate());const isT=dt.toDateString()===today.toDateString();const ds=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");h+='<div class="day-c'+(past?" dis":"")+(isT?" today":"")+'" onclick=\"pickDay(\''+ds+'\',this)\" data-d=\"'+ds+'\">'+d+'</div>';}g.innerHTML=h;}

}

        ph=document.getElementById("regPhone").value,e=document.getElementById("regEmail").value;
  if(!u||!p) return alert("йҗўг„ҰеҹӣйҚҡе¶…жӢ°зҖөе—ҷзҲңи№Үе‘ӯпҪһ");
  if(p!==p2) return alert("ж¶“гӮҶоӮјзҖөе—ҷзҲңж¶“е¶„з«ҙй‘·?);
  if(!n) return alert("жҝ®ж’іжӮ•и№Үе‘ӯпҪһ");
  const body = {username:u,password:p,real_name:n,phone:ph,email:e,role:role};
  if(role==='expert'){
    const ind=document.getElementById("regIndustry").value;
    if(!ind) return alert("з’ҮзғҪвӮ¬еӨӢе«Ёзҗӣеұјз¬ҹ");
    body.industry=ind; body.title=document.getElementById("regTitle").value;
    body.self_intro=document.getElementById("regIntro").value;
  }
  if(role==='enterprise'){
    const c=document.getElementById("regCompany").value, cc=document.getElementById("regCreditCode").value;
    if(!c||!cc) return alert("жөјдҪ·з¬ҹйҚҡе¶ҮРһйҚңеІҖзІәж¶“вӮ¬з»ҖеҸҘзҙ°ж·Үпј„ж•Өжө пҪҮзҲңи№Үе‘ӯпҪһ");
    body.company_name=c; body.credit_code=cc; body.contact_title=document.getElementById("regContactTitle").value;
  }
  const r=await fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json());
  if(r.success){alert("еЁүг„Ҙе”ҪйҺҙж„¬е§ӣй”ӣеІғоҮ¬йҗ§иҜІз¶Қ");closeModal();showLogin();}else alert(r.error||"еЁүг„Ҙе”Ҫжҫ¶иҫ«и§Ұ");
}

}
