<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家平台</title>
<link rel="stylesheet" href="/style.css">
<script src="/packages.js"></script>
<script>
// 给 renderExpertDetail 注入评价区
const _origRenderExpertDetail = renderExpertDetail;
renderExpertDetail = function(id) {
  _origRenderExpertDetail(id);
  // 等 DOM 更新后注入评价
  setTimeout(() => injectReviews(id), 100);
};
</script>
<script src="/rating.js"></script>
<script src="/push.js"></script><script src="/schedule.js"></script><script src="/booking_slots.js"></script>
  </head>
<body>
<nav>
  <div class="logo">专家平台</div>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right" id="navRight"></div>
</nav>
<div class="container" id="app"></div>
<div class="modal-mask" id="modal" style="display:none">
  <div class="modal-box" id="modalBox">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>
<script>
let API="/api", currentUser=null, currentExpert=null, currentStars=0, msgTargetId=null, currentExpertDetail=null;
const ORDER_STATUS={pending_payment:"待支付",paid:"已支付",confirmed:"已确认",completed:"已完成",cancelled:"已取消",refunding:"退款中",refunded:"已退款"};
function escHtml(s){return s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):"";}
function escJs(s){return s?String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'"):"";}
async function api(url,opts){opts=opts||{};if(opts.body&&typeof opts.body==="string")opts.headers=Object.assign({"Content-Type":"application/json"},opts.headers||{});const r=await fetch(API+url,opts);return r.json();}
async function me(){try{const r=await fetch(API+"/me").then(r=>r.json());currentUser=r.user||null;currentExpert=r.expert||null;}catch(e){currentUser=null;currentExpert=null;}renderNav();if(currentUser){loadNotifCount();window.USER=currentUser;window.USER_ID=currentUser.id;}else{window.USER=null;window.USER_ID=null;}}
function renderNav(){const l=document.getElementById("navLinks"),r=document.getElementById("navRight");if(!l)return;let h="";if(currentUser){h+='<a href="#" onclick="renderHome();return false;" class="nav-link">首页</a>';h+='<a href="#" onclick="renderFavorites();return false;" class="nav-link">收藏</a>';h+='<a href="#" onclick="renderOrders();return false;" class="nav-link">我的订单</a>';h+='<a href="#" onclick="renderMessages();return false;" class="nav-link">消息</a>';h+='<a href="#" onclick="renderNotifications();return false;" class="nav-link">通知<span class="notif-badge" id="notifBadge" style="display:none">0</span></a><a href="#" onclick="renderServicePackages();return false;" class="nav-link">服务套餐</a><a href="#" onclick="renderRanking();return false;" class="nav-link">专家排名</a>';if(currentExpert&&currentExpert.audit_status==='approved')h+='<a href="#" onclick="renderArticles();return false;" class="nav-link">文章</a>';h+='<a href="#" onclick="renderProfile();return false;" class="nav-link">个人</a>';if(currentUser.role==="admin")h+='<a href="#" onclick="renderAdmin();return false;" class="nav-link">管理</a>';}else{h+='<a href="#" onclick="renderHome();return false;" class="nav-link">首页</a>';h+='<a href="#" onclick="showLogin();return false;" class="nav-link">登录</a>';h+='<a href="#" onclick="showRegister();return false;" class="nav-link">注册</a>';}l.innerHTML=h;if(r){if(currentUser)r.innerHTML="<span>"+escHtml(currentUser.username)+'</span><button onclick="logout()">退出</button>';else r.innerHTML="";}}
async function loadNotifCount(){try{const r=await fetch(API+"/notifications/unread-count").then(r=>r.json());const b=document.getElementById("notifBadge");if(b&&r.count>0){b.style.display="inline-flex";b.textContent=r.count;}else if(b)b.style.display="none";}catch(e){}}
async function renderNotifications(){const list=await fetch(API+"/notifications").then(r=>r.json());let h="<div class=\"section-title\">通知中心</div>";if(!list||!list.length){h+="<div class=\"empty\"><div class=\"icon\">通知</div>暂无通知</div>";}else{h+="<div class=\"card\"><button class=\"btn btn-sm btn-outline\" onclick=\"markAllRead()\">全部标为已读</button></div><div class=\"card\">";for(const n of list){h+="<div class=\"notify-item "+(n.is_read?"":"unread")+"\" onclick=\"markRead("+n.id+")\"><div style=\"font-weight:600\">"+escHtml(n.title)+"</div><div style=\"font-size:13px;color:#718096;margin-top:4px\">"+(n.content||"")+"</div><div style=\"font-size:12px;color:#a0aec0;margin-top:4px\">"+(n.created_at||"")+"</div></div>";}h+="</div>";}document.getElementById("app").innerHTML=h;}
async function markRead(id){await fetch(API+"/notifications/read",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({ids:[id]})});renderNotifications();}
async function markAllRead(){await fetch(API+"/notifications/read",{method:"PUT"});renderNotifications();}
function renderHome(){const industries=["人工智能","数据科学","软件开发","产品设计","市场营销","金融投资","法律咨询","医疗健康","教育培训","其他"];let io="<option value=\"\">全部行业</option>";for(const ind of industries)io+="<option>"+ind+"</option>";let h="<div class=\"hero\"><h1>找到最适合您的专家</h1><p>实名认证 · 评价透明 · 预约便捷 · 文章分享 · 支付保障</p><div class=\"search-box\"><input type=\"text\" id=\"searchInput\" placeholder=\"搜索专家...\"><select id=\"industryFilter\">"+io+"</select><button class=\"btn btn-primary\" onclick=\"searchExperts()\">搜索</button></div></div><div class=\"section-title\">推荐专家</div><div class=\"expert-grid\" id=\"expertList\"></div>";document.getElementById("app").innerHTML=h;loadExperts();}
async function loadExperts(page){page=page||1;const kw=document.getElementById("searchInput")?document.getElementById("searchInput").value:"";const ind=document.getElementById("industryFilter")?document.getElementById("industryFilter").value:"";let url="/experts?page="+page+"&limit=12";if(kw)url+="&keyword="+encodeURIComponent(kw);if(ind)url+="&industry="+encodeURIComponent(ind);const data=await fetch(API+url).then(r=>r.json());const el=document.getElementById("expertList");if(!data.list||!data.list.length){el.innerHTML="<div class=\"empty\"><div class=\"icon\">专家</div>暂无专家</div>";return;}let h="";for(const e of data.list){const pu=e.photo_path?"<img class=\"avatar\" src=\""+e.photo_path+"\" onerror=\"this.style.display='none'\">":"<div class=\"avatar\">?</div>";h+="<div class=\"expert-card\" onclick=\"renderExpertDetail("+e.id+")\">"+pu+"<div class=\"name\">"+escHtml(e.real_name||"专家")+"</div><div class=\"title\">"+escHtml(e.title||"")+"</div><div><span class=\"tag\">"+escHtml(e.industry||"")+"</span></div>"+(e.avg_rating?"<div class=\"rating\">"+"★".repeat(Math.round(e.avg_rating))+" "+e.avg_rating.toFixed(1)+" ("+e.review_count+"条)</div>":"")+(e.consult_fee>0?"<div class=\"fee\">¥"+e.consult_fee+"/次</div>":"")+(e.verified?"<div class=\"verified-badge\">已认证</div>":"")+"</div>";}el.innerHTML=h;}
function searchExperts(){loadExperts(1);}
async function renderExpertDetail(id){const e=await fetch(API+"/experts/"+id).then(r=>r.json());currentExpertDetail=e;let h="<div class=\"card\" style=\"display:flex;gap:24px;flex-wrap:wrap\"><div style=\"flex:0 0 120px;text-align:center\">"+(e.photo_path?"<img src=\""+e.photo_path+"\" style=\"width:120px;height:120px;border-radius:50%;object-fit:cover\">":"<div style=\"width:120px;height:120px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto\">?</div>")+"</div><div style=\"flex:1;min-width:240px\"><div style=\"font-size:22px;font-weight:700\">"+escHtml(e.real_name||"专家")+"</div><div style=\"color:#667eea;margin:6px 0\">"+escHtml(e.title||"")+"</div><div><span class=\"tag\">"+escHtml(e.industry||"")+"</span>"+(e.verified?" <span class=\"tag\" style=\"background:#f0fff4;color:#22543d\">已认证</span>":"")+"</div>"+(e.avg_rating?"<div style=\"margin-top:8px;color:#f6ad55;font-size:16px\">"+"★".repeat(Math.round(e.avg_rating))+" "+e.avg_rating.toFixed(1)+" ("+e.review_count+"条)</div>":"")+(e.consult_fee>0?"<div style=\"margin-top:8px;font-size:15px;font-weight:600;color:#667eea\">咨询费：¥"+e.consult_fee+"/次</div>":"")+"</div></div>";if(e.audit_status==='approved'){if(e.self_intro)h+="<div class=\"card\"><div style=\"font-weight:600;margin-bottom:10px\">个人简介</div><div style=\"font-size:14px;line-height:1.8\">"+escHtml(e.self_intro).replace(/\n/g,"<br>")+"</div></div>";if(e.achievements)h+="<div class=\"card\"><div style=\"font-weight:600;margin-bottom:10px\">主要业绩</div><div style=\"font-size:14px;line-height:1.8\">"+escHtml(e.achievements).replace(/\n/g,"<br>")+"</div></div>";const reviews=await fetch(API+"/experts/"+id+"/reviews").then(r=>r.json());h+="<div class=\"card\"><div class=\"section-title\">用户评价 ("+(reviews||[]).length+")</div>";if(currentUser&&currentUser.id!==e.user_id)h+="<div style=\"margin-bottom:16px\"><button class=\"btn btn-sm btn-outline\" onclick=\"showReviewForm("+id+")\">写评价</button></div>";if(!reviews||!reviews.length)h+="<div style=\"color:#a0aec0;font-size:14px\">暂无评价</div>";else{for(const rv of reviews){h+="<div class=\"review-card\"><div style=\"font-weight:600\">"+escHtml(rv.real_name||rv.username)+"</div><div class=\"star-display\">"+"★".repeat(rv.rating)+"☆".repeat(5-rv.rating)+" <span style=\"color:#718096;font-size:13px\">"+rv.rating+"星</span></div>"+(rv.content?"<div class=\"content\">"+escHtml(rv.content).replace(/\n/g,"<br>")+"</div>":"")+(rv.reply?"<div class=\"reply\"><strong>专家回复：</strong>"+escHtml(rv.reply).replace(/\n/g,"<br>")+"</div>":"")+"<div style=\"font-size:12px;color:#a0aec0;margin-top:6px\">"+(rv.created_at||"")+"</div></div>";}}h+="</div>";const articles=await fetch(API+"/experts/"+id+"/articles").then(r=>r.json());if(articles&&articles.length){h+="<div class=\"card\"><div class=\"section-title\">专家文章</div>";for(const a of articles){h+="<div class=\"article-preview\" onclick=\"renderArticle("+a.id+")\"><div style=\"font-weight:600;font-size:15px\">"+escHtml(a.title)+"</div><div style=\"font-size:12px;color:#a0aec0;margin-top:4px\">"+(a.views||0)+"次阅读 · "+(a.created_at||"")+"</div></div>";}h+="</div>";}}if(currentUser&&currentUser.id!==e.user_id){h+="<div class=\"card\" style=\"display:flex;gap:10px;flex-wrap:wrap\"><button class=\"btn btn-primary\" onclick=\"showBooking("+id+")\">预约咨询</button><button class=\"btn btn-outline\" onclick=\"toggleFavorite("+id+","+(e.is_favorite?1:0)+")\">"+(e.is_favorite?"已收藏":"收藏")+"</button><button class=\"btn btn-outline\" onclick=\"showSendMessage("+e.user_id+")\">发消息</button></div>";}document.getElementById("app").innerHTML=h;}
function showReviewForm(expertId){openModal("<h3>写评价</h3><div class=\"form-group\"><label>评分</label><div class=\"stars\" id=\"starPicker\"><span onclick=\"setStar(1)\">☆</span><span onclick=\"setStar(2)\">☆</span><span onclick=\"setStar(3)\">☆</span><span onclick=\"setStar(4)\">☆</span><span onclick=\"setStar(5)\">☆</span></div></div><div class=\"form-group\"><label>评价内容</label><textarea id=\"reviewContent\" placeholder=\"分享您的咨询体验...\"></textarea></div><button class=\"btn btn-primary\" onclick=\"submitReview("+expertId+")\">提交评价</button>");currentStars=0;}
function setStar(n){currentStars=n;const s=document.querySelectorAll("#starPicker span");s.forEach((x,i)=>x.textContent=i<n?"★":"☆");}
async function submitReview(expertId){if(!currentStars)return alert("请选择评分");await fetch(API+"/experts/"+expertId+"/review",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rating:currentStars,content:document.getElementById("reviewContent").value})});closeModal();renderExpertDetail(expertId);}
async function renderFavorites(){const list=await fetch(API+"/favorites").then(r=>r.json());let h="<div class=\"section-title\">我的收藏</div>";if(!list||!list.length){h+="<div class=\"empty\"><div class=\"icon\">收藏</div>暂无收藏</div>";}else{h+="<div class=\"expert-grid\">";for(const e of list){h+="<div class=\"expert-card\" onclick=\"renderExpertDetail("+e.id+")\">"+(e.photo_path?"<img class=\"avatar\" src=\""+e.photo_path+"\" onerror=\"this.style.display='none'\">":"<div class=\"avatar\">?</div>")+"<div class=\"name\">"+escHtml(e.real_name||"专家")+"</div><div class=\"title\">"+escHtml(e.title||"")+"</div><div><span class=\"tag\">"+escHtml(e.industry||"")+"</span></div></div>";}h+="</div>";}document.getElementById("app").innerHTML=h;}
async function toggleFavorite(expertId,isFav){if(isFav)await fetch(API+"/favorites/"+expertId,{method:"DELETE"});else await fetch(API+"/favorites/"+expertId,{method:"POST"});renderExpertDetail(expertId);}
async function renderOrders(){const list=await fetch(API+"/bookings").then(r=>r.json());let h="<div class=\"section-title\">我的订单</div>";if(!list||!list.length){h+="<div class=\"empty\"><div class=\"icon\">订单</div>暂无订单</div>";document.getElementById("app").innerHTML=h;return;}h+="<div class=\"card\"><table><tr><th>专家</th><th>日期</th><th>时间</th><th>主题</th><th>金额</th><th>状态</th><th>操作</th></tr>";for(const b of list){const st=ORDER_STATUS[b.status]||b.status;h+="<tr><td>"+escHtml(b.expert_name||"")+"</td><td>"+(b.booking_date||"")+"</td><td>"+(b.booking_time||"")+"</td><td>"+escHtml(b.topic||"")+"</td><td>¥"+(b.amount||0)+"</td><td><span class=\"status-badge status-"+b.status+">"+st+"</span></td><td>";if(b.status==="pending_payment"&&b.user_id===currentUser.id)h+="<button class=\"btn btn-sm btn-primary\" onclick=\"payBooking("+b.id+","+(b.amount||0)+")\">去支付 ¥"+(b.amount||0)+"</button> ";if(b.status==="paid"&&b.user_id===currentUser.id)h+="<button class=\"btn btn-sm btn-danger\" onclick=\"requestRefund("+b.id+")\">申请退款</button> ";if(b.status==="paid"&&currentExpert&&b.expert_id===currentExpert.id)h+="<button class=\"btn btn-sm btn-primary\" onclick=\"respondBooking("+b.id+",'confirmed')\">确认预约</button> <button class=\"btn btn-sm btn-danger\" onclick=\"respondBooking("+b.id+",'rejected')\">拒绝</button> ";if(b.status==="confirmed"&&currentExpert&&b.expert_id===currentExpert.id)h+="<button class=\"btn btn-sm btn-primary\" onclick=\"completeBooking("+b.id+")\">标记完成</button> ";if(b.status==="completed"&&b.user_id===currentUser.id){const hasR=await fetch(API+"/experts/"+b.expert_id+"/reviews").then(r=>r.json()).then(l=>l.some(rv=>rv.user_id===currentUser.id));if(!hasR)h+="<button class=\"btn btn-sm btn-outline\" onclick=\"showReviewForm("+b.expert_id+")\">写评价</button>";}if((b.status==="pending_payment"||b.status==="paid")&&b.user_id===currentUser.id)h+=" <button class=\"btn btn-sm btn-danger\" onclick=\"cancelBooking("+b.id+")\">取消</button>";h+="</td></tr>";}h+="</table></div>";document.getElementById("app").innerHTML=h;}
function showBooking(expertId){const today=new Date().toISOString().split("T")[0];openModal("<h3>预约咨询</h3><div class=\"form-group\"><label>预约日期</label><input type=\"date\" id=\"bookingDate\" min=\""+today+"\"></div><div class=\"form-group\"><label>预约时间</label><input type=\"time\" id=\"bookingTime\" value=\"09:00\"></div><div class=\"form-group\"><label>咨询时长（分钟）</label><input type=\"number\" id=\"bookingDuration\" value=\"60\" min=\"30\" max=\"180\"></div><div class=\"form-group\"><label>咨询主题</label><textarea id=\"bookingTopic\" placeholder=\"简要描述...\"></textarea></div><button class=\"btn btn-primary\" onclick=\"submitBooking("+expertId+")\">提交预约</button>");}
async function submitBooking(expertId){const d=document.getElementById("bookingDate").value,t=document.getElementById("bookingTime").value;if(!d||!t)return alert("请选择日期和时间");const r=await fetch(API+"/bookings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({expert_id:expertId,booking_date:d,booking_time:t,duration:document.getElementById("bookingDuration").value,topic:document.getElementById("bookingTopic").value})}).then(r=>r.json());closeModal();if(r.success){if(r.amount>0){alert("预约已提交，请支付咨询费用 ¥"+r.amount);payBooking(r.booking_id,r.amount);}else{alert("预约已提交（免费咨询）");renderOrders();}}else alert(r.error||"提交失败");}
function payBooking(bookingId,amount){if(amount===0){renderOrders();return;}openModal("<h3>支付订单</h3><div class=\"alert alert-info\">订单金额：<strong>¥"+amount+"</strong></div><div class=\"form-group\"><label>选择支付方式</label><div style=\"display:flex;gap:12px;margin-top:8px\"><button class=\"btn btn-outline\" style=\"flex:1\" onclick=\"doPay("+bookingId+",'mock')\">模拟支付</button><button class=\"btn btn-outline\" style=\"flex:1\" disabled>微信支付（待接入）</button><button class=\"btn btn-outline\" style=\"flex:1\" disabled>支付宝（待接入）</button></div></div><div style=\"margin-top:12px;font-size:12px;color:#718096\">当前为模拟支付，点击'模拟支付'即可完成。</div>");}
async function doPay(bookingId,method){const r=await fetch(API+"/bookings/"+bookingId+"/pay",{method:"POST",headers:{"Content-Type":"application/json"}}).then(r=>r.json());closeModal();if(r.success){alert("支付成功！等待专家确认。");renderOrders();}else alert(r.error||"支付失败");}
async function completeBooking(id){if(!confirm("确认标记为已完成？完成后用户可进行评价。"))return;await fetch(API+"/bookings/"+id+"/complete",{method:"POST"});alert("已标记为完成");renderOrders();}
async function requestRefund(id){const reason=prompt("请输入退款原因：");if(reason===null)return;await fetch(API+"/bookings/"+id+"/refund",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({reason:reason})});alert("退款申请已提交，等待管理员审核。");renderOrders();}
async function respondBooking(id,status){let reason="";if(status==="rejected")reason=prompt("请输入拒绝原因：");await fetch(API+"/bookings/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:status,reject_reason:reason})});alert("操作成功");renderOrders();}
async function cancelBooking(id){if(!confirm("确定取消？"))return;await fetch(API+"/bookings/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"cancelled"})});renderOrders();}
async function renderMessages(){const list=await fetch(API+"/messages").then(r=>r.json());const partners={};for(const m of(list||[])){const pid=m.from_user===currentUser.id?m.to_user:m.from_user;if(!partners[pid])partners[pid]={name:m.from_username,messages:[]};partners[pid].messages.push(m);}let h="<div class=\"section-title\">我的消息</div><div style=\"display:flex;gap:20px;flex-wrap:wrap\"><div style=\"flex:0 0 240px\" class=\"card\">";for(const[pid,p]of Object.entries(partners)){h+="<div style=\"padding:10px;cursor:pointer;border-radius:8px;margin-bottom:4px\" onclick=\"renderMessageThread("+pid+",'"+escJs(p.name)+"')\">"+escHtml(p.name)+" <span style=\"font-size:12px;color:#a0aec0\">("+p.messages.length+")</span></div>";}h+="</div><div style=\"flex:1;min-width:300px\" id=\"messageThread\"><div class=\"empty\"><div class=\"icon\">消息</div>选择对话</div></div></div>";document.getElementById("app").innerHTML=h;await fetch(API+"/messages/read",{method:"PUT"});}
async function renderMessageThread(partnerId,partnerName){const list=await fetch(API+"/messages").then(r=>r.json());const thread=(list||[]).filter(m=>(m.from_user===parseInt(partnerId)&&m.to_user===currentUser.id)||(m.from_user===currentUser.id&&m.to_user===parseInt(partnerId))).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));let h="<div style=\"font-weight:600;margin-bottom:12px\">与 "+escHtml(partnerName)+" 的对话</div><div style=\"max-height:400px;overflow-y:auto;margin-bottom:12px\">";for(const m of thread){const cls=m.from_user===currentUser.id?"msg-from":"msg-to";h+="<div class=\"msg-bubble "+cls+"\">"+escHtml(m.content)+"</div>";}h+="</div><div style=\"display:flex;gap:8px\"><input type=\"text\" id=\"msgInput\" placeholder=\"输入消息...\" style=\"flex:1;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px\" onkeydown=\"if(event.key==='Enter')sendMessage("+partnerId+")\"><button class=\"btn btn-primary\" onclick=\"sendMessage("+partnerId+")\">发送</button></div>";document.getElementById("messageThread").innerHTML=h;document.getElementById("msgInput").focus();}
async function sendMessage(toUserId){const input=document.getElementById("msgInput");if(!input||!input.value.trim())return;await fetch(API+"/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to_user:toUserId,content:input.value})});renderMessageThread(toUserId,await fetch(API+"/experts/"+toUserId).then(r=>r.json()).then(e=>e?e.real_name:""));}
function showSendMessage(userId){renderMessageThread(userId,"");}
function showLogin(){openModal("<h3>登录</h3><div class=\"form-group\"><label>用户名</label><input type=\"text\" id=\"loginUser\"></div><div class=\"form-group\"><label>密码</label><input type=\"password\" id=\"loginPass\"></div><button class=\"btn btn-primary\" onclick=\"doLogin()\">登录</button>");}
async function doLogin(){const u=document.getElementById("loginUser").value,p=document.getElementById("loginPass").value;const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})}).then(r=>r.json());if(r.success){closeModal();await me();renderHome();}else alert(r.error||"登录失败");}

async function doWithdraw(){
  const amt=parseInt(document.getElementById("wdAmount").value);
  if(!amt||amt<100)return alert("最低提现100元");
  const r=await fetch(API+"/expert/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amt,account_name:document.getElementById("wdName").value,account_number:document.getElementById("wdNumber").value,bank_name:document.getElementById("wdBank").value})});
  const j=await r.json();
  if(j.success){alert("提现申请已提交，预计3-5个工作日到账");renderWallet();}else alert(j.error||"申请失败");
}

async function loadWithdrawals(){
  const list=await fetch(API+"/expert/withdrawals").then(r=>r.json());
  let h="";
  if(!list||!list.length){h="<div style=\"color:#a0aec0;padding:12px 0\">暂无提现记录</div>";}else{
    h="<table><tr><th>金额</th><th>状态</th><th>时间</th></tr>";
    for(const w of list){h+="<tr><td>¥"+w.amount+"</td><td>"+(w.status==='pending'?'待处理':w.status==='approved'?'已通过':'已驳回')+"</td><td>"+(w.created_at||'')+"</td></tr>";}h+="</table>";
  }
  document.getElementById("wdList").innerHTML=h;
}

    h+="<div style=\"background:linear-gradient(135deg,#38a169,#2f855a);color:#fff;padding:20px;border-radius:12px\"><div style=\"font-size:28px;font-weight:700\">¥"+(d.total_paid_out||0)+"</div><div style=\"font-size:13px;opacity:.9\">累计已打款</div></div>";
    h+="<div style=\"background:linear-gradient(135deg,#f6ad55,#ed8936);color:#fff;padding:20px;border-radius:12px\"><div style=\"font-size:28px;font-weight:700\">¥"+(d.pending_withdrawals||0)+"</div><div style=\"font-size:13px;opacity:.9\">待处理提现</div></div>";
    h+="<div style=\"background:linear-gradient(135deg,#4fd1c5,#38b2ac);color:#fff;padding:20px;border-radius:12px\"><div style=\"font-size:28px;font-weight:700\">"+((d.commission_rate||0)*100)+"%<small style=\"font-size:14px\">比例</small></div><div style=\"font-size:13px;opacity:.9\">平台抽成比</div></div>";
    h+="</div>";
    h+="<div class=\"card\"><h3>平台配置</h3><div class=\"form-group\"><label>平台抽成比例（0-1，如 0.15 表示 15%）</label><input type=\"number\" id=\"cfgRate\" step=\"0.01\" min=\"0\" max=\"1\" value=\""+(d.commission_rate||0.15)+"\"></div><button class=\"btn btn-primary\" onclick=\"saveCommissionRate()\">保存配置</button></div>";
    document.getElementById("adminContent").innerHTML=h;
  });
}

async function saveCommissionRate(){
  const v=parseFloat(document.getElementById("cfgRate").value);
  if(isNaN(v)||v<0||v>1)return alert("请输入0-1之间的数字");
  await fetch(API+"/admin/config/commission_rate",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:v})});
  alert("保存成功");adminRevenue();
}


// 通知未读数量轮询
async function loadUnreadCount(){
  try {
    const d = await fetch(API+"/notifications/unread-count").then(r=>r.json());
    const el = document.getElementById("notifBadge");
    if(el){
      if(d.count>0){el.style.display="inline-block";el.textContent=d.count>99?"99+":d.count;}
      else el.style.display="none";
    }
  } catch(e){}
}
// 标为已读后刷新角标
const _origRenderNotif = renderNotifications;
// 每30秒轮询一次
setInterval(loadUnreadCount, 30000);
// 登录后启动轮询（checkAuth 占位，避免报错）
function checkAuth() {
  loadUnreadCount();
}
</script>
